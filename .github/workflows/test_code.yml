name: Tests
on:
  pull_request:
  release:
    types: [created]

jobs:
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # FAST GATE (runs first, blocks everything else)
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  lint-and-format:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # TEST THE CODE (models + serialization + saving +
  # data formats — one combined job per backend)
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  test-code:
    name: Test the code (${{ matrix.backend }})
    needs: lint-and-format
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        backend: [torch, tensorflow, jax]
    env:
      KERAS_BACKEND: ${{ matrix.backend }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ matrix.backend }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-${{ matrix.backend }}-
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools
          pip install -U keras>=3.11.0 pytest pytest-cov
          pip install torch>=2.5.0 jax[cpu] tensorflow-cpu>=2.19.0
          pip install sentencepiece matplotlib>=3.8.0 pillow
          pip install -e .
      - name: Run all tests
        run: |
          pytest tests/integration/test_backend_compatibility.py \
                 tests/integration/test_serialization.py \
                 tests/integration/test_model_saving.py \
                 tests/integration/test_data_formats.py \
                 -v --durations=20 --cov=kmodels --cov-append \
                 -m "not slow and not gpu"
      - name: Generate coverage
        run: coverage xml -o coverage.xml
      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          flags: ${{ matrix.backend }}
          fail_ci_if_error: false
